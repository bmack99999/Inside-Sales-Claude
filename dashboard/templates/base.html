<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SkyTab Inside Sales{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-logo">&#9642;</span>
      SkyTab Inside Sales
    </div>
    <div class="nav-links">
      <a href="{{ url_for('kpis') }}" class="nav-link {% if request.endpoint == 'kpis' %}active{% endif %}">
        KPIs
      </a>
      <a href="{{ url_for('my_leads') }}" class="nav-link {% if request.endpoint == 'my_leads' %}active{% endif %}">
        My Leads
      </a>
      <a href="{{ url_for('recycled') }}" class="nav-link {% if request.endpoint == 'recycled' %}active{% endif %}">
        Recycled
      </a>
      <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
        Notes
      </a>
      <a href="{{ url_for('commissions') }}" class="nav-link {% if request.endpoint == 'commissions' %}active{% endif %}">
        Commissions
      </a>
      <a href="{{ url_for('settings') }}" class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}">
        ⚙ Settings
      </a>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="{{ url_for('static', filename='charts.js') }}"></script>
  {% block scripts %}{% endblock %}

  <!-- Global hover tooltip for notes/activities cells -->
  <div id="notes-tooltip" class="notes-tooltip-box" style="display:none;position:absolute;"></div>
  <script>
  (function() {
    const tt = document.getElementById('notes-tooltip');
    let currentEl = null;

    document.addEventListener('mouseover', function(e) {
      const el = e.target.closest('[data-tooltip]');
      if (!el || !el.dataset.tooltip) { hide(); return; }
      currentEl = el;
      tt.textContent = el.dataset.tooltip;
      tt.style.display = 'block';
      position(e);
    });

    document.addEventListener('mousemove', function(e) {
      if (tt.style.display === 'none') return;
      position(e);
    });

    document.addEventListener('mouseout', function(e) {
      if (currentEl && !currentEl.contains(e.relatedTarget)) hide();
    });

    function hide() { tt.style.display = 'none'; currentEl = null; }

    function position(e) {
      const pad = 14, vw = window.innerWidth, vh = window.innerHeight;
      let x = e.clientX + pad, y = e.clientY + pad;
      tt.style.left = '-9999px'; tt.style.top = '-9999px'; // measure off-screen
      tt.style.display = 'block';
      const w = tt.offsetWidth, h = tt.offsetHeight;
      if (x + w > vw - 8) x = e.clientX - w - pad;
      if (y + h > vh - 8) y = e.clientY - h - pad;
      tt.style.left = (x + window.scrollX) + 'px';
      tt.style.top  = (y + window.scrollY) + 'px';
    }
  })();
  </script>
</body>
</html>
